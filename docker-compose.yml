services:
  postgres:
    image: postgres:16-alpine
    container_name: llm_gateway_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: llm_gateway
    ports:
      - "5432:5432"
    volumes:
      - llm_gateway_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d llm_gateway"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  llm_gateway_pgdata:
